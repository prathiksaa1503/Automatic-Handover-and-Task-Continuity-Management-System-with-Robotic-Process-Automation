<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Digital Work Handover System</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="topbar">
  <div class="topbar-content">
    <div class="logo">
      <span>WorkHandover</span>
    </div>
    <nav class="topbar-nav">
      <a href="index.html">Home</a>
      <a href="register.html" class="nav-login">Sign Up</a>
    </nav>
  </div>
</header>

<section class="hero-bg">
  <div class="overlay"></div>
  <div class="animated-bg"></div>
  <canvas id="particles-canvas" class="particles-canvas"></canvas>

  <div class="hero-content form-card">
    <div class="form-header">
      <div class="form-icon-wrapper">
        <div class="form-icon">🔐</div>
        <div class="form-icon-glow"></div>
      </div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to continue</p>
    </div>

    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label>Role <span class="required-indicator">*</span></label>
        <div class="input-wrapper">
          <select id="role" required>
            <option value="">Select role</option>
            <option value="employee">Employee</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Email <span class="required-indicator">*</span></label>
        <div class="input-wrapper">
          <input type="email" id="email" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password <span class="required-indicator">*</span></label>
        <div class="input-wrapper">
          <input type="password" id="password" required>
        </div>
      </div>

      <button type="submit" class="btn primary full">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader"></span>
        <span class="btn-arrow">→</span>
        <span class="btn-shine"></span>
      </button>
    </form>

    <div class="form-footer">
      <p class="switch">
        Don’t have an account?
        <a href="register.html">Create one</a>
      </p>
    </div>
  </div>
</section>

<!-- ✅ REAL LOGIC FILES -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
